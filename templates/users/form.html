{% extends "base.html" %}

{% block page_title %}{{ '编辑用户' if user else '新建用户' }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-person"></i> {{ '编辑用户' if user else '新建用户' }}
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="username" name="username"
                               value="{{ user.username if user else '' }}" required
                               {% if user %}readonly{% endif %}>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="real_name" class="form-label">真实姓名</label>
                        <input type="text" class="form-control" id="real_name" name="real_name"
                               value="{{ user.real_name if user else '' }}">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="phone" class="form-label">手机号</label>
                        <input type="text" class="form-control" id="phone" name="phone"
                               value="{{ user.phone if user else '' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="email" name="email"
                               value="{{ user.email if user else '' }}">
                    </div>
                </div>
            </div>

            {% if not user %}
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">确认密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="mb-3">
                <label for="password" class="form-label">新密码（留空不修改）</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="输入新密码以修改...">
            </div>
            {% endif %}

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="role_id" class="form-label">角色</label>
                        <select class="form-select" id="role_id" name="role_id">
                            <option value="">请选择角色</option>
                            {% for role in roles %}
                            <option value="{{ role.id }}" {{ 'selected' if user and user.role_id == role.id else '' }}>
                                {{ role.name }} - {{ role.description }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="store_id" class="form-label">所属店铺</label>
                        <select class="form-select" id="store_id" name="store_id">
                            <option value="">请选择店铺</option>
                            {% for store in stores %}
                            <option value="{{ store.id }}" {{ 'selected' if user and user.store_id == store.id else '' }}>
                                {{ store.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            {% if user %}
            <div class="mb-3">
                <label for="status" class="form-label">状态</label>
                <select class="form-select" id="status" name="status">
                    <option value="active" {{ 'selected' if user.status == 'active' else '' }}>正常</option>
                    <option value="inactive" {{ 'selected' if user.status == 'inactive' else '' }}>禁用</option>
                    <option value="locked" {{ 'selected' if user.status == 'locked' else '' }}>锁定</option>
                </select>
            </div>
            {% endif %}

            <hr>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> 保存
                </button>
                <a href="{{ url_for('users') }}" class="btn btn-secondary">
                    <i class="bi bi-x-lg"></i> 取消
                </a>
            </div>
        </form>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password');

    if (confirmPassword && password !== confirmPassword.value) {
        e.preventDefault();
        alert('两次输入的密码不一致！');
    }
});
</script>
{% endblock %}
